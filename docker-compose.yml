version: '3.8'

services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/error404
      - JWT_SECRET=anyrandomstring
      - CLIENT_ORIGIN=http://localhost:4000
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  frontend-test:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: test
    profiles:
      - test

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
